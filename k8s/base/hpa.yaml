# SmartLead Horizontal Pod Autoscaler
# Spec-Driven: Generated from SmartLead/harness.json kubernetes configuration

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: smartlead-api-hpa
  labels:
    app: smartlead-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: smartlead-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 25
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
