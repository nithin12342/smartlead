# SmartLead API Deployment
# Spec-Driven: Generated from SmartLead/harness.json kubernetes configuration

apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartlead-api
  labels:
    app: smartlead-api
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: smartlead-api
  template:
    metadata:
      labels:
        app: smartlead-api
        version: v1
    spec:
      serviceAccountName: smartlead-api
      containers:
      - name: smartlead-api
        image: smartlead-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: smartlead-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: smartlead-secrets
              key: redis-url
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            configMapKeyRef:
              name: smartlead-config
              key: mlflow-tracking-uri
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: smartlead-api
              topologyKey: kubernetes.io/hostname
