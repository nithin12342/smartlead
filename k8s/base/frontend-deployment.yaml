# SmartLead React Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartlead-frontend
  namespace: smartlead
  labels:
    app: smartlead-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartlead-frontend
  template:
    metadata:
      labels:
        app: smartlead-frontend
        tier: frontend
    spec:
      containers:
      - name: nginx
        image: smartlead-registry.azurecr.io/smartlead-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: smartlead-frontend
  namespace: smartlead
spec:
  selector:
    app: smartlead-frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
