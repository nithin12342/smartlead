# SmartLead Ingress Configuration
# Spec-Driven: Generated from SmartLead/harness.json kubernetes configuration

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartlead-api-ingress
  labels:
    app: smartlead-api
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read_timeout: "120"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: lets-encrypt-prod
spec:
  tls:
  - hosts:
    - api.smartlead.example.com
    secretName: smartlead-api-tls
  rules:
  - host: api.smartlead.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: smartlead-api
            port:
              number: 80
