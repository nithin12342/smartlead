# SmartLead Network Policies
# Spec-Driven: Generated from SmartLead/harness.json security_harness

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: smartlead-api-network-policy
  labels:
    app: smartlead-api
spec:
  podSelector:
    matchLabels:
      app: smartlead-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  - from:
    - podSelector:
        matchLabels:
          app: smartlead-api
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: valkey-cache
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
